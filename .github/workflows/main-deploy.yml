name: Main Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: GUT unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot 4.6
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.6-stable_linux.x86_64
          echo "/tmp/godot" >> $GITHUB_PATH

      - name: Import project assets
        run: |
          Godot_v4.6-stable_linux.x86_64 --headless --import --quit || true

      - name: Run GUT tests
        run: |
          Godot_v4.6-stable_linux.x86_64 --headless \
            --script addons/gut/gut_cmdln.gd \
            -gconfig=.gutconfig.json

  deploy:
    name: Export HTML5 and deploy
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot 4.6
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.6-stable_linux.x86_64
          echo "/tmp/godot" >> $GITHUB_PATH

      - name: Install Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          cp -r /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Import project assets
        run: |
          Godot_v4.6-stable_linux.x86_64 --headless --import --quit || true

      - name: Export HTML5
        run: |
          mkdir -p build/web

          [ -d "addons/gut" ] && mv addons/gut addons/gut_hidden
          [ -d "test" ]       && mv test test_hidden

          Godot_v4.6-stable_linux.x86_64 --headless --export-release "Web" build/web/index.html

          [ -d "addons/gut_hidden" ] && mv addons/gut_hidden addons/gut
          [ -d "test_hidden" ]       && mv test_hidden test

          echo "=== build/web ==="
          find build/web -maxdepth 2 -type f | sort
          test -f build/web/index.html

      - name: Prepare deploy directory
        run: |
          mkdir -p public
          cp -a build/web/. public/
          touch public/.nojekyll

      - name: Deploy to GitHub Pages (root)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true
          force_orphan: false
          enable_jekyll: false
          destination_dir: .
