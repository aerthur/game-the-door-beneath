name: GUT tests

on: [push, pull_request]

jobs:
  test:
    name: Run GUT unit tests
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: "4.6"
      GUT_VERSION: "9.3.0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Godot binary
        uses: actions/cache@v4
        id: cache-godot
        with:
          path: /usr/local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64"
          sudo mv "/tmp/godot/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          rm -rf /tmp/godot.zip /tmp/godot

      - name: Cache GUT addon
        uses: actions/cache@v4
        id: cache-gut
        with:
          path: addons/gut
          key: gut-${{ env.GUT_VERSION }}

      - name: Install GUT ${{ env.GUT_VERSION }} addon
        if: steps.cache-gut.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/bitwes/Gut/releases/download/v${{ env.GUT_VERSION }}/Gut_v${{ env.GUT_VERSION }}.zip" \
            -O /tmp/gut.zip
          unzip -q /tmp/gut.zip -d /tmp/gut
          mkdir -p addons
          cp -r /tmp/gut/addons/gut addons/gut
          rm -rf /tmp/gut.zip /tmp/gut

      - name: Import project assets (headless)
        run: |
          godot --headless --path . --import --quit 2>&1 || true
        timeout-minutes: 2

      - name: Run GUT unit tests
        run: |
          godot --headless --path . \
            -s addons/gut/gut_cmdln.gd \
            -gconfig=.gutconfig.json \
            -gexit \
            2>&1
        timeout-minutes: 5
