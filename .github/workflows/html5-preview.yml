name: HTML5 Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-preview:
    name: Export HTML5 and deploy PR preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot 4.6
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip -O tmp_godot.zip
          unzip -q tmp_godot.zip -d tmp_godot
          chmod +x tmp_godot/Godot_v4.6-stable_linux.x86_64
          echo "$PWD/tmp_godot" >> $GITHUB_PATH

      - name: Install Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -O tmp_templates.tpz
          unzip -q tmp_templates.tpz -d tmp_templates
          cp -r tmp_templates/templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Import project assets
        run: Godot_v4.6-stable_linux.x86_64 --headless --import --quit

      - name: Export HTML5
        run: |
          mkdir -p build/web
          Godot_v4.6-stable_linux.x86_64 --headless --export-release "Web" build/web/index.html

      - name: Prepare preview directory
        run: |
          mkdir -p public/previews/pr-${{ github.event.pull_request.number }}
          cp -r build/web/* public/previews/pr-${{ github.event.pull_request.number }}/

      - name: Deploy preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
          publish_branch: gh-pages
          force_orphan: false
          enable_jekyll: false

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const url = "https://" + owner + ".github.io/" + repo + "/previews/pr-" + pr + "/";
            const msg = "### 🌐 Preview Web

[👉 Jouer à la preview de cette PR](" + url + ")

Build mise à jour automatiquement. Optimisée pour navigateur desktop et mobile en orientation paysage.";
            
            const comments = await github.rest.issues.listComments({
              owner: owner,
              repo: repo,
              issue_number: pr
            });
            
            const existing = comments.data.find(c => c.user.type === 'Bot' && c.body.includes('### 🌐 Preview Web'));
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: owner,
                repo: repo,
                comment_id: existing.id,
                body: msg
              });
            } else {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: pr,
                body: msg
              });
            }
