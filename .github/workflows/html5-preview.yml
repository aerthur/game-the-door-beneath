name: HTML5 Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-preview:
    name: Export HTML5 and deploy PR preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot 4.6
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          chmod +x /tmp/godot/Godot_v4.6-stable_linux.x86_64
          echo "/tmp/godot" >> $GITHUB_PATH

      - name: Install Godot export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          cp /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.6.stable/

      - name: Import project assets
        run: |
          Godot_v4.6-stable_linux.x86_64 --headless --import --quit || true

      - name: Export HTML5
        run: |
          mkdir -p build/web
          Godot_v4.6-stable_linux.x86_64 --headless --export-release "Web" build/web/index.html

      - name: Deploy preview to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          destination_dir: previews/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repoOwner = context.repo.owner;
            const repoName = context.repo.repo;
            const previewUrl = `https://${repoOwner}.github.io/${repoName}/previews/pr-${prNumber}/`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            const body = [
              '## Preview web',
              '',
              `**[Jouer a la preview de cette PR](${previewUrl})**`,
              '',
              `Build : \`${sha}\` — mise a jour automatiquement a chaque nouveau commit.`,
              '',
              '> Optimise pour navigateur desktop et mobile en orientation paysage.',
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: repoOwner,
              repo: repoName,
              issue_number: prNumber,
            });

            const existing = comments.data.find(
              c => c.user.type === 'Bot' && c.body.includes('Preview web')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: repoOwner,
                repo: repoName,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repoOwner,
                repo: repoName,
                issue_number: prNumber,
                body,
              });
            }
